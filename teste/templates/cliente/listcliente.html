<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Flask</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-dark text-white text-center">

    <div class="container mt-5">
        <h1>🔥 Clientes gamers a 1 km com Flask!</h1>
        <p>Seu HTML foi carregado corretamente.</p>

        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody>
                {% for cliente in clientes %}
                <tr>
                    <td>{{ cliente.id_cliente }}</td>
                    <td>{{ cliente.nome }}</td>
                    <td>{{ cliente.email }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <br><hr>
        <button class="btn btn-outline-danger btn-lg" onclick="window.location.href='/'">
            Home
        </button>
        <button class="btn btn-outline-danger btn-lg" onclick="window.location.href='/cliente'">
            Voltar
        </button>
        <button class="btn btn-outline-danger btn-lg" onclick="window.location.href='/cliente/cadastro'">
            Cadastrar
        </button>
    </div>

</body>
</html>
